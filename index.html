    // --- Gemini API 呼び出し共通関数 (Cloudflare Workers経由) ---
    const callGeminiAPI = async (prompt, systemInstruction = "", isJson = false, schema = null) => {
      const url = `${WORKER_URL}/generate-text`;

      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {}
      };

      if (isJson) {
        payload.generationConfig.responseMimeType = "application/json";
        if (schema) {
          payload.generationConfig.responseSchema = schema;
        }
      }

      const maxRetries = 5;
      const baseDelay = 1000;

      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `API error: ${response.status}`);
          }

          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!text) throw new Error("No text in response");

          return isJson ? JSON.parse(text) : text;
        } catch (error) {
          if (attempt === maxRetries - 1) {
            throw new Error(`APIの呼び出しに失敗しました。詳細: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, baseDelay * Math.pow(2, attempt)));
        }
      }
    };

    // --- 画像生成API呼び出し関数 (Imagen 4 - Cloudflare Workers経由) ---
    const generateImageAPI = async (prompt) => {
      const url = `${WORKER_URL}/generate-image`;
      
      const payload = {
        instances: { prompt: prompt },
        parameters: { sampleCount: 1 }
      };

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `画像生成APIエラー: ${response.status}`);
      }

      const data = await response.json();
      if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
      } else {
        throw new Error("画像の生成に失敗しました。");
      }
    };

    function App() {
      const [activeTab, setActiveTab] = useState(1);
      const [loading, setLoading] = useState(false);

      // 作成モード切り替え

      const [creationMode, setCreationMode] = useState("normal");

      // Step 1 - 通常テーマ用
      const [genre, setGenre] = useState("");
      const [themes, setThemes] = useState([]);
      const [selectedTheme, setSelectedTheme] = useState("");

      // Step 1 - アプリ紹介テーマ用 / ショート動画用共通

      // Step 1 - note書きました告知用

      const [noteSummary, setNoteSummary] = useState("");

          setCopiedStates(prev => ({ ...prev, [id]: true }));

          console.error('Copy failed', err);

      // 1. テーマ案の生成
      const generateThemes = async () => {

          if (creationMode === "normal") {

            systemPrompt = `あなたは優秀なコンテンツマーケターおよびソフトウェアエヴァンジェリストです。

            単なる機能紹介や説明書（マニュアル）的な退屈なタイトルではなく、読者が抱える生々しい「悩み」や「相談ストーリー」にフォーカスし、その解決策として自作アプリが登場するドラマチックで魅力的なタイトルにしてください。
            出力はJSON形式で、5つのテーマ案の文字列（タイトルのみ）の配列を返してください。`;
            
            prompt = `以下のアプリ情報に基づき、購入意欲を高める魅力的なnote記事のタイトル案（テーマ案）を5つ作成してください。
            
            ■ アプリ名: ${appName}
            ■ 開発のきっかけ（悩み・相談等）: ${appTrigger}
            ■ 解決できる悩み・価値: ${appValue}
            ${appUrl ? `■ アプリURL: ${appUrl}` : ''}`;
          }
          
          const schema = { type: "ARRAY", items: { type: "STRING" } };
          const result = await callGeminiAPI(prompt, systemPrompt, true, schema);
          
          let parsedThemes = [];
          if (Array.isArray(result)) {
            parsedThemes = result.map(t => typeof t === 'string' ? t : (t.title || t.name || JSON.stringify(t)));
          } else if (result && result.themes && Array.isArray(result.themes)) {
            parsedThemes = result.themes.map(t => typeof t === 'string' ? t : (t.title || JSON.stringify(t)));
          }
          setThemes(parsedThemes);

      // 2. 目次案の生成

        setLoading(true); setError("");
        try {
          let monetizationStrategy = "";
          let targetAppInfo = "";

          if (creationMode === "app") {
            targetAppInfo = `【アプリデータ】:
            - アプリ名: ${appName}
            ${appUrl ? `- アプリURL: ${appUrl}` : ''}
            - 開発のきっかけ: ${appTrigger}
            - 解決できる価値: ${appValue}\n`;
          }

          if (isPaid) {
            monetizationStrategy = `【有料販売（無料・有料の分割設計）】: この商品は「予定価格：${price}円」で販売予定です。
            ${creationMode === "app" 
              ? `前半の無料公開エリアで「なぜこのアプリを作ることになったのか（ユーザーの悩み・葛藤・相談のストーリー）」を語り、アプリの基本メカニズムを解説。最も強力な「具体的な活用方法」「裏ワザ・秘密のテンプレート（はさみマークのペイウォールライン）」の手前で有料エリアへと移行する構成にしてください。`
              : `前半の「無料公開エリア」で読者に強い共感を伝え、最高の解決策の手前（はさみマークのペイウォールライン）で有料へと移行する寸止め構成にしてください。`

          } else {
            monetizationStrategy = `【無料公開＋外部誘導】: この記事は無料で一般公開されますが、最終的に読者を外部サイトへ自然に誘導する目的があります。${redirectUrl || appUrl ? `誘導先URL: ${redirectUrl || appUrl}` : ''} ${redirectPurpose || appValue ? `誘導目的: ${redirectPurpose || appValue}` : ''}`;

          大見出し（章タイトル等の大枠）のみを使って、シンプルで多すぎない論理的な構成にしてください。導入から具体的な解決策、まとめまでの流れを作ってください。
          ${targetAppInfo}
          ${monetizationStrategy}
          ${benefit ? `【提供価値（得られる未来）】: ${benefit}` : ''}
          ${hasBonus ? `【購入特典】: ${bonusContent || '限定特典・限定付録ワークシート等'}` : ''}

          setLoading(false);

      };

      // 3. 本文の生成 (無料/有料寸止め境界線挿入を完全自動化)

        if (!toc) { setError("目次を入力してください"); return; }
        setLoading(true); setError("");
        try {

          let appStoryPrompt = "";

            単なるアプリの使い方マニュアルにしないでください。

Your goal is to generate an extraordinarily beautiful, professional-grade, high-conversion image generation prompt in English for a 16:9 wide landscape banner thumbnail.

To ensure the output image is of the highest professional quality (NOT cheap or generic), strictly apply these guidelines in your generated prompt:
1. **Cinematic Lighting & Color**: Use premium, atmospheric lighting terms such as "cinematic backlighting", "soft studio key light", "subtle neon glow", "golden hour glow", or "sophisticated dual-tone color scheme". Avoid flat or boring colors.

3. **Quality & Render Style**: Use high-end rendering terms suitable for the chosen art style. For 3D/Vectors, use "trending on ArtStation, Octane Render, 8k, masterpiece, clean path, smooth gradients". For photographic styles, use "shot on 85mm lens, f/1.8, soft bokeh, high-end commercial photography, photorealistic, sharp focus on subject, detailed textures".

Output ONLY the final raw English prompt text. Do not include any quotes, introductions, markdown formatting, or conversational text.`;

                        </div>
                        <p className="text-xs text-slate-500 leading-relaxed">{style.desc}</p>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={generateThumbnailImage}
                    disabled={isGeneratingImage || (creationMode === "normal" && !selectedTheme && !genre) || (creationMode === "app" && !appName) || (creationMode === "written_note" && !noteTitle) || (creationMode === "short_video" && !appName)}
                    className="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-4 rounded-xl font-bold hover:from-indigo-500 hover:to-indigo-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50 shadow-md text-lg mt-6"
                  >
                    {isGeneratingImage ? (
                      <><Loader2 className="w-5 h-5 animate-spin" /> Gemini Engineがプロンプトとデザインを極限調整中...（約10〜20秒）</>
                    ) : (
                      <><Sparkles className="w-5 h-5 text-indigo-200" /> プレミアム仕様でサムネイル画像を自動生成する</>
                    )}
                  </button>

                  {/* 生成結果 */}
                  {(generatedImageUrl || generatedImagePrompt) && (
                    <div className="mt-8 space-y-6">
                      {generatedImageUrl && (
                        <div className="space-y-4 animate-fade-in">
                          <div className="flex items-center justify-between border-b pb-2">
                             <div className="flex items-center gap-2">
                               <span className="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-bold">生成成功</span>
                               <h3 className="text-sm font-bold text-slate-800">完成したサムネイル見出し画像 (16:9)</h3>
                             </div>
                             <a 
                               href={generatedImageUrl} 
                               download="note_thumbnail_image.png"
                               className="text-white bg-indigo-600 hover:bg-indigo-700 flex items-center gap-1.5 text-sm px-4 py-2 rounded-lg font-bold shadow-sm transition-colors"
                             >
                               <Download className="w-4 h-4" /> 画像を保存
                             </a>
                          </div>
                          <div className="bg-slate-100 border border-slate-200 rounded-2xl p-3 shadow-inner overflow-hidden flex justify-center">
                            <img src={generatedImageUrl} alt="Generated Thumbnail" className="w-full max-w-3xl h-auto rounded-xl shadow-md border border-white" />
                          </div>
                          <p className="text-xs text-slate-500 text-center leading-relaxed">
                            💡 <strong>デザイナーからのヒント：</strong>この画像にはすでに文字入れ用の美しい余白（グラデーションやボケ空間）が施されています。<br />
                            Canva等を使って、空いているスペースにお好みのフォントでnoteのタイトルを配置すれば、プロ顔負けのバナーが瞬時に完成します！
                          </p>
                        </div>
                      )}

                      {generatedImagePrompt && (
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 space-y-3">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <span className="bg-indigo-100 text-indigo-800 text-xs px-2.5 py-0.5 rounded-full font-bold">Prompt Generated</span>
                              <h4 className="text-xs font-bold text-slate-600 uppercase tracking-wider">AI専用高精細プログラマブルプロンプト（英語）</h4>
                            </div>
                            <button onClick={() => handleCopy(generatedImagePrompt, 'img-prompt')} className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-xs">
                              {copiedStates['img-prompt'] ? <Check className="text-green-500" /> : <Copy />}
                            </button>
                          </div>
                          <div className="bg-white border border-slate-150 p-4 rounded-lg">
                            <p className="text-xs font-mono text-slate-600 break-words leading-relaxed select-all">{generatedImagePrompt}</p>
                          </div>
                          <p className="text-[10px] text-slate-400 italic">
                            ※この高度なプロンプトは、構図・質感・空きスペース・ライティング・アングルすべてが最先端のImagen用に細かくチューニングされています。
                          </p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
