    const callGeminiAPI = async (prompt, systemInstruction = "", isJson = false, schema = null) => {
      const url = `${WORKER_URL}/generate-text`;

      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {}
      };

      if (isJson) {
        payload.generationConfig.responseMimeType = "application/json";
        if (schema) {
          payload.generationConfig.responseSchema = schema;
        }
      }

      const maxRetries = 5;
      const baseDelay = 1000;

      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `API error: ${response.status}`);
          }

          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!text) throw new Error("No text in response");

          return isJson ? JSON.parse(text) : text;
        } catch (error) {
          if (attempt === maxRetries - 1) {
            throw new Error(`APIの呼び出しに失敗しました。詳細: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, baseDelay * Math.pow(2, attempt)));
        }
      }
    };

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `画像生成APIエラー: ${response.status}`);
      }

      const data = await response.json();
      if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
      } else {
        throw new Error("画像の生成に失敗しました。");
      }
    };

                            </div>
                            <button onClick={() => handleCopy(marketingData.instagram_post, 'insta')} className="text-slate-200 hover:text-white flex items-center gap-1 text-xs">
                              {copiedStates['insta'] ? <Check className="w-4 h-4 text-green-400" /> : <Copy className="w-4 h-4" />} コピー
                            </button>
                          </div>
                          <div className="p-4 bg-slate-50">
                            <textarea readOnly value={marketingData.instagram_post} rows={8} className="w-full text-sm resize-none outline-none text-slate-700 bg-transparent" />
                          </div>
                        </div>
                      )}

                      <div className="flex justify-end pt-4">
                         <button
                          onClick={() => setActiveTab(4)}
                          className="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-md"
                        >
                          Step 4: サムネイル作成へ進む
                        </button>
                      </div>

                    </div>
                  )}
                </div>
              )}

              {}
              {activeTab === 4 && (
                <div className="space-y-6 animate-fade-in">
                  <div className="flex items-center justify-between border-b pb-2">
                    <h2 className="text-lg font-bold flex items-center gap-2">
                      <span className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">4</span>
                      サムネイル画像 & Midjourney / Imagen 4 プロンプト生成
                    </h2>
                  </div>

                  {/* Ratio Selector */}
                  <div className="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-200 animate-fade-in">
                    <h3 className="font-bold text-sm text-slate-800">アスペクト比を選択</h3>
                    <div className="grid grid-cols-3 gap-2">
                      {[
                        { id: "16:9", label: "横長 16:9", desc: "note見出し・YouTube" },
                        { id: "9:16", label: "縦長 9:16", desc: "リール・TikTok" },
                        { id: "1:1", label: "正方形 1:1", desc: "Instagram・LINE" }
                      ].map((ratio) => (
                        <button
                          key={ratio.id}
                          type="button"
                          onClick={() => setAspectRatio(ratio.id)}
                          className={`p-3 rounded-lg border text-left transition-all ${
                            aspectRatio === ratio.id
                              ? "bg-indigo-600 border-indigo-600 text-white shadow-md"
                              : "bg-white border-slate-200 text-slate-700 hover:border-indigo-300"
                          }`}
                        >
                          <div className="font-bold text-sm">{ratio.label}</div>
                          <div className={`text-[10px] mt-1 ${aspectRatio === ratio.id ? "text-indigo-200" : "text-slate-400"}`}>{ratio.desc}</div>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Style Selector */}
                  <div className="space-y-3 animate-fade-in">
                    <h3 className="font-bold text-sm text-slate-800">スタイルを選択</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                      {THUMBNAIL_STYLES.map((style) => (
                        <div 
                          key={style.id}
                          onClick={() => setSelectedStyleId(style.id)}
                          className={`cursor-pointer p-4 rounded-xl border transition-all ${
                            selectedStyleId === style.id 
                              ? "bg-indigo-50 border-indigo-500 shadow-md ring-1 ring-indigo-500" 
                              : "bg-white border-slate-200 hover:border-indigo-300"
                          }`}
                        >
                          <div className="flex items-center justify-between mb-2">
                            <h3 className="font-bold text-sm text-slate-800">{style.name}</h3>
                            {selectedStyleId === style.id && <Check className="text-indigo-600" />}
                          </div>
                          <p className="text-xs text-slate-500 leading-relaxed">{style.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>

                  <button
                    onClick={generateThumbnailImage}
                    disabled={isGeneratingImage}
                    className="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-4 rounded-xl font-bold hover:from-indigo-500 hover:to-indigo-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50 shadow-md text-lg mt-6"
                  >
                    {isGeneratingImage ? (
                      <><Loader2 className="w-5 h-5 animate-spin" /> サムネイル画像を生成中...</>
                    ) : (
                      <><Sparkles className="w-5 h-5 text-indigo-200" /> サムネイル画像を生成する</>
                    )}
                  </button>

                  {/* Output Image & Prompt */}
                  {(generatedImageUrl || generatedImagePrompt) && (
                    <div className="mt-8 space-y-6 animate-fade-in">
                      {generatedImageUrl && (
                        <div className="space-y-4 animate-fade-in">
                          <div className="flex items-center justify-between border-b pb-2">
                             <span className="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-bold">完成イメージ</span>
                             <a 
                               href={generatedImageUrl} 
                               download={`note_thumbnail_${aspectRatio.replace(':', '_')}.png`}
                               className="text-white bg-indigo-600 hover:bg-indigo-700 flex items-center gap-1.5 text-sm px-4 py-2 rounded-lg font-bold shadow-sm"
                             >
                               <Download className="w-4 h-4" /> 画像を保存
                             </a>
                          </div>
                          <div className="bg-slate-100 border border-slate-200 rounded-2xl p-4 shadow-inner flex justify-center items-center overflow-hidden">
                            <img src={generatedImageUrl} alt="Generated Thumbnail" className="rounded-xl shadow-md border border-white max-h-[500px] object-cover" />
                          </div>
                        </div>
                      )}

                      {generatedImagePrompt && (
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 space-y-3 animate-fade-in">
                          <div className="flex items-center justify-between">
                            <h4 className="text-xs font-bold text-slate-600 uppercase tracking-wider">Midjourney / Imagen 4 プロンプト</h4>
                            <button onClick={() => handleCopy(generatedImagePrompt, 'img-prompt')} className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-xs">
                              {copiedStates['img-prompt'] ? <Check className="text-green-500" /> : <Copy />} コピー
                            </button>
                          </div>
                          <div className="bg-white border border-slate-200 p-4 rounded-lg">
                            <p className="text-xs font-mono text-slate-600 break-words leading-relaxed select-all">{generatedImagePrompt}</p>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
