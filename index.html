<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>売れるnote＆集客メーカー</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone for JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .whitespace-pre-line {
            white-space: pre-line;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Main State
            const [activeTab, setActiveTab] = useState('step1');
            const apiKey = ''; // 自動補填されるため空文字で固定
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [copiedMessage, setCopiedMessage] = useState('');

            // Step 1 State: Concept Inputs
            const [contentType, setContentType] = useState('ノウハウ系');
            const [targetAudience, setTargetAudience] = useState('');
            const [userTheme, setUserTheme] = useState('');
            const [noteConcept, setNoteConcept] = useState(null);

            // Step 2 State: Full Article Content
            const [generatedContent, setGeneratedContent] = useState('');

            // Step 3 State: Marketing Data
            const [marketingData, setMarketingData] = useState(null);
            const [snsTab, setSnsTab] = useState('x');

            // Utility: Copy text to clipboard using execCommand fallback
            const copyToClipboard = (text, label = 'コピーしました！') => {
                try {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);

                    setCopiedMessage(label);
                    setTimeout(() => setCopiedMessage(''), 2500);
                } catch (err) {
                    setError('コピーに失敗しました。手動で選択してコピーしてください。');
                }
            };

            const generateConcept = async () => {
                if (!userTheme.trim()) {
                    setError('テーマまたは悩みを入力してください。');
                    return;
                }
                setLoading(true);
                setError('');

                try {
                    const systemPrompt = `あなたは年商1億円超の売れるnoteプロデューサー兼コピーライターです。
ユーザーから渡されたテーマ・ジャンル・ターゲットに基づき、noteで爆発的に売れる「売れる構成案（コンセプト）」を作成してください。

必ず以下のJSON形式でのみ出力してください。
{
    "title": "読者の目を惹くキャッチーなタイトル（30文字以内）",
    "catchphrase": "ターゲットに刺さるサブタイトル・キャッチコピー",
    "targetProblem": "ターゲットが抱える痛烈な悩み・欲求（3点）",
    "solution": "このnoteを読むことで得られるベネフィットと解決策",
    "tableOfContents": [
        "第1章: 導入・共感（なぜ今このテーマなのか）",
        "第2章: 原因の追及（なぜ今まで解決できなかったのか）",
        "第3章: 具体的な解決ノウハウ・アクションプラン",
        "第4章: 成功例・実践時の注意点",
        "第5章: まとめ・購入者特典のご案内"
    ],
    "priceSuggestion": "おすすめの販売価格帯（例: 980円〜2,980円）"
}`;

                    const userQuery = `【商品タイプ】: ${contentType}
【ターゲット層】: ${targetAudience || '未指定（AIにおまかせ）'}
【テーマ・悩み】: ${userTheme}`;

                    const payload = {
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json"
                        }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `API通信エラー (Status: ${response.status})`);
                    }

                    const data = await response.json();
                    const textRes = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (textRes) {
                        const parsed = JSON.parse(textRes);
                        setNoteConcept(parsed);
                        setActiveTab('step2');
                    } else {
                        throw new Error('応答データが空でした。再度お試しください。');
                    }
                } catch (err) {
                    console.error(err);
                    setError(`コンセプト生成エラー: ${err.message || '処理中にエラーが発生しました。'}`);
                } finally {
                    setLoading(false);
                }
            };

            const generateFullArticle = async () => {
                if (!noteConcept) {
                    setError('先にStep 1でコンセプトを作成してください。');
                    return;
                }
                setLoading(true);
                setError('');

                try {
                    const systemPrompt = `あなたはnote記事累計5万部以上を販売したトップWebライターです。
提供されたコンセプト案に基づき、読者が思わず引き込まれ、購入して大満足する高クオリティなnote本文を作成してください。

Markdown形式で出力し、見出し（#、##）、箇条書き、強調太字、太字枠などを活用してスマホで圧倒的に読みやすい構成にしてください。`;

                    const userQuery = `以下のコンセプトに基づきnote記事本文全文を作成してください。

タイトル: ${noteConcept.title}
サブコピー: ${noteConcept.catchphrase}
解決策: ${noteConcept.solution}
目次構成:
${noteConcept.tableOfContents ? noteConcept.tableOfContents.join('\n') : ''}`;

                    const payload = {
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `API通信エラー (Status: ${response.status})`);
                    }

                    const data = await response.json();
                    const textRes = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (textRes) {
                        setGeneratedContent(textRes);
                        setActiveTab('step3');
                    } else {
                        throw new Error('記事本文の生成に失敗しました。');
                    }
                } catch (err) {
                    console.error(err);
                    setError(`本文生成エラー: ${err.message || '処理に失敗しました。'}`);
                } finally {
                    setLoading(false);
                }
            };

            const generateMarketing = async () => {
                if (!generatedContent && !noteConcept) {
                    setError('先にStep 1またはStep 2でコンテンツを生成してください。');
                    return;
                }
                setLoading(true);
                setError('');

                try {
                    const systemPrompt = `あなたはSNSマーケティングとコピーライティングの超一流プロです。
渡されたコンテンツ（またはコンセプト）を元に、各SNSのアルゴリズム特性を最大限に活かした集客投稿文・タイトル案を作成してください。

【各SNSアルゴリズム最適化ルール】

1. 𝕏 (Twitter):
- 滞在時間と拡散（リポスト/返信）を最大化する構成。
- 1行目に強烈なフック（ターゲットの悩みの代弁、数字、共感）。
- 箇条書きや空白行を活用し、スマホで一目で読める高い視覚的可読性。
- 末尾に返信やプロフ・noteへの誘導（CTA）を入れる。

2. Threads:
- コメント・会話（対話）を生み出す親しみやすいトーン。
- 個人としてのリアルな体験談・失敗談・気づき（ストーリー性）。
- 連続投稿（スレッド形式）で滞在時間を伸ばす（配列形式で3件分出力）。

3. Instagram (キャプション):
- 最初の2行（「続きを読む」の前）で惹きつけるフック。
- 「後で見返したい」と思わせる「保存（Save）」を促す文言を入れる。
- 読者がストレスなく読める改行と絵文字装飾。
- 最後に検索性・発見タグを高めるハッシュタグ（5〜8個）。

4. Facebook (※最重要ルール：ベタ書き厳禁！適切な改行と空行):
- 滞在時間を伸ばす長文ストーリーテリング（背景、葛藤、発見、解決）。
- 読みやすさを最重視し、2〜3文ごとに必ず「改行＋空行（\\n\\n）」を入れて段落分けする（単一の塊テキストは不可）。
- 友達やフォロワーとコメント欄で交流が発生する問いかけを入れる。

5. ショート動画台本 (TikTok / Reels / Shorts):
- 冒頭1〜3秒で離脱を防ぐ強力なフック（結論ファースト、衝撃の事実）。
- テンポの良い台詞回し（15秒〜30秒程度）。

必ず以下のJSON形式でのみ出力してください（余計なテキストは含めないでください）。
{
    "titles": ["タイトル案1", "タイトル案2", "タイトル案3"],
    "x_post": "𝕏用の投稿本文",
    "threads": ["Threads投稿1 (1/3)", "Threads投稿2 (2/3)", "Threads投稿3 (3/3)"],
    "instagram_post": "Instagram用のキャプション本文",
    "facebook_post": "Facebook用の投稿本文（段落ごとに空行が入った可読性の高い構成）",
    "video_captions": ["【冒頭フック】〇〇", "【本文】〇〇", "【結び・CTA】〇〇"]
}`;

                    const userQuery = `【題材コンテンツ情報】
フォーマット: ${contentType}
ターゲット: ${targetAudience || '特になし'}
テーマ・タイトル: ${noteConcept ? noteConcept.title : userTheme}
本文要約/抜粋:
${generatedContent ? generatedContent.substring(0, 800) : JSON.stringify(noteConcept)}`;

                    const payload = {
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: {
                            responseMimeType: "application/json"
                        }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `API通信エラー (Status: ${response.status})`);
                    }

                    const data = await response.json();
                    const textRes = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (textRes) {
                        const parsed = JSON.parse(textRes);
                        setMarketingData(parsed);
                        setActiveTab('step3');
                    } else {
                        throw new Error('集客コピーの生成に失敗しました。');
                    }
                } catch (err) {
                    console.error(err);
                    setError(`集客コピー生成エラー: ${err.message || '処理に失敗しました。'}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-5xl mx-auto px-4 py-8">
                    {/* Notification Toast */}
                    {copiedMessage && (
                        <div className="fixed top-5 right-5 z-50 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 animate-bounce">
                            <i className="fa-solid fa-circle-check"></i>
                            <span className="font-medium text-sm">{copiedMessage}</span>
                        </div>
                    )}

                    {/* App Header */}
                    <header className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200/80 mb-6">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div>
                                <span className="inline-block bg-teal-100 text-teal-800 text-xs font-semibold px-3 py-1 rounded-full mb-2">
                                    <i className="fa-solid fa-bolt mr-1"></i> Gemini API 連携・完全自動プロモ
                                </span>
                                <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">
                                    売れるnote ＆ SNS集客プロモメーカー
                                </h1>
                                <p className="text-slate-500 text-xs md:text-sm mt-1">
                                    コンセプト設計 → 本文作成 → 各SNSアルゴリズム最適化集客文章を一括生成
                                </p>
                            </div>
                        </div>

                        {/* Error Alert Box */}
                        {error && (
                            <div className="mt-4 p-4 bg-rose-50 border border-rose-200 text-rose-700 rounded-xl text-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
                                <div className="flex items-start gap-2">
                                    <i className="fa-solid fa-triangle-exclamation text-rose-500 mt-0.5"></i>
                                    <div>
                                        <p className="font-bold">エラーが発生しました</p>
                                        <p className="text-xs text-rose-600 mt-0.5">{error}</p>
                                    </div>
                                </div>
                                <button
                                    onClick={() => copyToClipboard(error, 'エラー詳細をコピーしました')}
                                    className="shrink-0 text-xs bg-white text-rose-600 border border-rose-200 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition"
                                >
                                    <i className="fa-regular fa-copy mr-1"></i> エラー詳細をコピー
                                </button>
                            </div>
                        )}
                    </header>

                    {/* Step Navigation Tabs */}
                    {}
                    <nav className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
                        <button
                            onClick={() => setActiveTab('step1')}
                            className={`p-3 rounded-xl font-bold text-xs md:text-sm text-left transition-all border ${
                                activeTab === 'step1' 
                                ? 'bg-teal-600 text-white border-teal-600 shadow-md shadow-teal-600/20' 
                                : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'
                            }`}
                        >
                            <span className="block text-[10px] opacity-80 uppercase tracking-wider">Step 1</span>
                            <i className="fa-solid fa-lightbulb mr-1.5"></i> 1. コンセプト設計
                        </button>

                        <button
                            onClick={() => setActiveTab('step2')}
                            disabled={!noteConcept}
                            className={`p-3 rounded-xl font-bold text-xs md:text-sm text-left transition-all border ${
                                activeTab === 'step2' 
                                ? 'bg-teal-600 text-white border-teal-600 shadow-md shadow-teal-600/20' 
                                : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed'
                            }`}
                        >
                            <span className="block text-[10px] opacity-80 uppercase tracking-wider">Step 2</span>
                            <i className="fa-solid fa-file-pen mr-1.5"></i> 2. note本文作成
                        </button>

                        <button
                            onClick={() => setActiveTab('step3')}
                            disabled={!noteConcept && !generatedContent}
                            className={`p-3 rounded-xl font-bold text-xs md:text-sm text-left transition-all border ${
                                activeTab === 'step3' 
                                ? 'bg-teal-600 text-white border-teal-600 shadow-md shadow-teal-600/20' 
                                : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed'
                            }`}
                        >
                            <span className="block text-[10px] opacity-80 uppercase tracking-wider">Step 3</span>
                            <i className="fa-solid fa-share-nodes mr-1.5"></i> 3. 多角SNS集客コピー
                        </button>

                        <button
                            onClick={() => setActiveTab('step4')}
                            disabled={!marketingData && !generatedContent}
                            className={`p-3 rounded-xl font-bold text-xs md:text-sm text-left transition-all border ${
                                activeTab === 'step4' 
                                ? 'bg-teal-600 text-white border-teal-600 shadow-md shadow-teal-600/20' 
                                : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100 disabled:opacity-50 disabled:cursor-not-allowed'
                            }`}
                        >
                            <span className="block text-[10px] opacity-80 uppercase tracking-wider">Step 4</span>
                            <i className="fa-solid fa-box-archive mr-1.5"></i> 4. 全出力一括保存
                        </button>
                    </nav>

                    {/* Main Content Area */}
                    <main className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200/80">
                        {/* STEP 1: CONCEPT FORM */}
                        {}
                        {activeTab === 'step1' && (
                            <div className="space-y-6">
                                <div className="border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                        <i className="fa-solid fa-wand-magic-sparkles text-teal-600"></i>
                                        売れるnoteのコンセプト＆構成設計
                                    </h2>
                                    <p className="text-slate-500 text-sm mt-1">
                                        発信テーマを入力するだけで、ターゲットの悩みに寄り添う高単価noteの骨組みを自動作成します。
                                    </p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-2">
                                            コンテンツのタイプ
                                        </label>
                                        <select
                                            value={contentType}
                                            onChange={(e) => setContentType(e.target.value)}
                                            className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none"
                                        >
                                            <option value="ノウハウ・実践手順系">ノウハウ・実践手順系（即効性のある解決策）</option>
                                            <option value="体験談・失敗からの大逆転系">体験談・失敗からの大逆転系（共感＆ストーリー）</option>
                                            <option value="テンプレート・配布素材系">テンプレート・配布素材系（時短＆作業効率化）</option>
                                            <option value="マインド・思考改善系">マインド・思考改善系（悩み解決・自己啓発）</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-700 uppercase mb-2">
                                            ターゲット層（任意）
                                        </label>
                                        <input
                                            type="text"
                                            value={targetAudience}
                                            onChange={(e) => setTargetAudience(e.target.value)}
                                            placeholder="例: 副業初心者、30代育児中の主婦、SNS運用に悩む個人事業主"
                                            className="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-slate-700 uppercase mb-2">
                                        メインテーマ・解決したい悩み <span className="text-rose-500">*</span>
                                    </label>
                                    <textarea
                                        rows="4"
                                        value={userTheme}
                                        onChange={(e) => setUserTheme(e.target.value)}
                                        placeholder="例: X（旧Twitter）で毎日投稿してもフォロワーが増えずマネタイズできない悩み。1ヶ月で月収5万円を目指すステップを教えたい。"
                                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-teal-500 focus:outline-none"
                                    ></textarea>
                                </div>

                                <button
                                    onClick={generateConcept}
                                    disabled={loading || !userTheme.trim()}
                                    className="w-full py-3.5 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl shadow-lg shadow-teal-600/25 transition flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {loading ? (
                                        <>
                                            <i className="fa-solid fa-spinner fa-spin"></i> コンセプトを生成中...
                                        </>
                                    ) : (
                                        <>
                                            <i className="fa-solid fa-sparkles"></i> コンセプト＆構成案を自動生成する
                                        </>
                                    )}
                                </button>

                                {/* Concept Display Result */}
                                {noteConcept && (
                                    <div className="mt-8 bg-slate-50 rounded-2xl p-6 border border-slate-200 space-y-4">
                                        <div className="flex items-center justify-between border-b border-slate-200 pb-3">
                                            <span className="text-xs font-bold text-teal-600 uppercase">生成されたコンセプト案</span>
                                            <span className="text-xs bg-teal-100 text-teal-800 px-2.5 py-0.5 rounded-full font-bold">
                                                推奨価格: {noteConcept.priceSuggestion || '1,980円'}
                                            </span>
                                        </div>
                                        <div>
                                            <h3 className="text-lg font-bold text-slate-900">{noteConcept.title}</h3>
                                            <p className="text-sm text-slate-600 mt-1">{noteConcept.catchphrase}</p>
                                        </div>

                                        <div className="bg-white p-4 rounded-xl border border-slate-200">
                                            <h4 className="text-xs font-bold text-slate-500 uppercase mb-2">想定目次構成</h4>
                                            <ul className="space-y-1 text-sm text-slate-700">
                                                {noteConcept.tableOfContents && noteConcept.tableOfContents.map((item, idx) => (
                                                    <li key={idx} className="flex items-center gap-2">
                                                        <i className="fa-solid fa-angle-right text-teal-500 text-xs"></i>
                                                        <span>{item}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>

                                        <div className="flex gap-3 pt-2">
                                            <button
                                                onClick={() => setActiveTab('step2')}
                                                className="flex-1 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold text-sm rounded-xl transition flex items-center justify-center gap-2"
                                            >
                                                Next: この構成で記事本文を作成（Step 2へ） <i className="fa-solid fa-arrow-right"></i>
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* STEP 2: ARTICLE WRITING */}
                        {}
                        {activeTab === 'step2' && (
                            <div className="space-y-6">
                                <div className="border-b border-slate-100 pb-4 flex items-center justify-between">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                            <i className="fa-solid fa-pen-nib text-teal-600"></i>
                                            note記事本文の自動ライティング
                                        </h2>
                                        <p className="text-slate-500 text-sm mt-1">
                                            Step 1の構成を基に、読者を引き込む高品質なMarkdown本文を作成します。
                                        </p>
                                    </div>
                                    <button
                                        onClick={generateFullArticle}
                                        disabled={loading}
                                        className="px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white font-bold text-xs rounded-xl shadow transition flex items-center gap-2 disabled:opacity-50"
                                    >
                                        {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-rotate"></i>}
                                        {generatedContent ? '本文を再生成' : '本文を生成する'}
                                    </button>
                                </div>

                                {generatedContent ? (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center bg-slate-100 p-3 rounded-xl">
                                            <span className="text-xs text-slate-600 font-medium">
                                                文字数: 約 {generatedContent.length} 文字
                                            </span>
                                            <button
                                                onClick={() => copyToClipboard(generatedContent, '記事本文をコピーしました')}
                                                className="text-xs bg-white hover:bg-slate-50 text-slate-700 font-semibold px-3 py-1.5 rounded-lg border border-slate-200 transition"
                                            >
                                                <i className="fa-regular fa-copy mr-1"></i> 全文コピー
                                            </button>
                                        </div>
                                        <textarea
                                            rows="16"
                                            value={generatedContent}
                                            onChange={(e) => setGeneratedContent(e.target.value)}
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono focus:ring-2 focus:ring-teal-500 focus:outline-none"
                                        ></textarea>
                                        <div className="pt-2">
                                            <button
                                                onClick={generateMarketing}
                                                disabled={loading}
                                                className="w-full py-3.5 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-xl shadow-lg transition flex items-center justify-center gap-2"
                                            >
                                                <i className="fa-solid fa-share-nodes"></i> 次へ: このnote用のSNS集客文章を作成する（Step 3）
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-12 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                        <i className="fa-solid fa-file-circle-plus text-4xl text-slate-300 mb-3 block"></i>
                                        <p className="text-slate-600 font-bold text-sm">note本文がまだ生成されていません</p>
                                        <p className="text-slate-400 text-xs mt-1 mb-4">ボタンを押すと自動的に記事全文が執筆されます。</p>
                                        <button
                                            onClick={generateFullArticle}
                                            disabled={loading}
                                            className="px-6 py-3 bg-teal-600 text-white font-bold rounded-xl shadow transition inline-flex items-center gap-2"
                                        >
                                            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                                            note記事本文を一括生成する
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* STEP 3: MULTI-SNS MARKETING COPY */}
                        {}
                        {activeTab === 'step3' && (
                            <div className="space-y-6">
                                <div className="border-b border-slate-100 pb-4 flex flex-col md:flex-row md:items-center justify-between gap-3">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                            <i className="fa-solid fa-bullhorn text-teal-600"></i>
                                            SNS別アルゴリズム最適化 集客投稿メーカー
                                        </h2>
                                        <p className="text-slate-500 text-sm mt-1">
                                            𝕏, Threads, Instagram, Facebook, 動画台本それぞれに最適化した投稿文です。
                                        </p>
                                    </div>
                                    <button
                                        onClick={generateMarketing}
                                        disabled={loading}
                                        className="px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white font-bold text-xs rounded-xl shadow transition flex items-center gap-2 disabled:opacity-50 shrink-0"
                                    >
                                        {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-rotate"></i>}
                                        {marketingData ? '集客文章を再生成' : '集客文章を生成する'}
                                    </button>
                                </div>

                                {!marketingData && (
                                    <div className="text-center py-12 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                        <i className="fa-solid fa-paper-plane text-4xl text-slate-300 mb-3 block"></i>
                                        <p className="text-slate-600 font-bold text-sm">集客用投稿文がまだ生成されていません</p>
                                        <p className="text-slate-400 text-xs mt-1 mb-4">ボタンを押すと各SNSのアルゴリズムに合わせた投稿文を作成します。</p>
                                        <button
                                            onClick={generateMarketing}
                                            disabled={loading}
                                            className="px-6 py-3 bg-teal-600 text-white font-bold rounded-xl shadow transition inline-flex items-center gap-2"
                                        >
                                            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                                            全SNS集客コピーを一括生成する
                                        </button>
                                    </div>
                                )}

                                {marketingData && (
                                    <div>
                                        {/* Title Suggestions Header */}
                                        {marketingData.titles && marketingData.titles.length > 0 && (
                                            <div className="mb-6 p-4 bg-teal-50 border border-teal-200 rounded-xl">
                                                <h3 className="text-xs font-bold text-teal-800 uppercase mb-2 flex items-center gap-1.5">
                                                    <i className="fa-solid fa-heading"></i> おすすめタイトル案（タップでコピー）
                                                </h3>
                                                <div className="space-y-2">
                                                    {marketingData.titles.map((t, idx) => (
                                                        <div
                                                            key={idx}
                                                            onClick={() => copyToClipboard(t, 'タイトル案をコピーしました')}
                                                            className="p-2.5 bg-white rounded-lg border border-teal-100 hover:border-teal-400 cursor-pointer text-sm text-slate-800 flex justify-between items-center transition"
                                                        >
                                                            <span className="font-medium">{t}</span>
                                                            <i className="fa-regular fa-copy text-teal-600 text-xs"></i>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* SNS Tabs */}
                                        <div className="flex border-b border-slate-200 overflow-x-auto mb-4">
                                            <button
                                                onClick={() => setSnsTab('x')}
                                                className={`px-4 py-2.5 font-bold text-xs md:text-sm border-b-2 whitespace-nowrap transition ${
                                                    snsTab === 'x' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                <i className="fa-brands fa-x-twitter mr-1.5"></i> 𝕏 (Twitter)
                                            </button>
                                            <button
                                                onClick={() => setSnsTab('threads')}
                                                className={`px-4 py-2.5 font-bold text-xs md:text-sm border-b-2 whitespace-nowrap transition ${
                                                    snsTab === 'threads' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                <i className="fa-solid fa-at mr-1.5"></i> Threads (対話重視)
                                            </button>
                                            <button
                                                onClick={() => setSnsTab('instagram')}
                                                className={`px-4 py-2.5 font-bold text-xs md:text-sm border-b-2 whitespace-nowrap transition ${
                                                    snsTab === 'instagram' ? 'border-pink-600 text-pink-600' : 'border-transparent text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                <i className="fa-brands fa-instagram mr-1.5"></i> Instagram
                                            </button>
                                            <button
                                                onClick={() => setSnsTab('facebook')}
                                                className={`px-4 py-2.5 font-bold text-xs md:text-sm border-b-2 whitespace-nowrap transition ${
                                                    snsTab === 'facebook' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                <i className="fa-brands fa-facebook mr-1.5"></i> Facebook (段落分け)
                                            </button>
                                            <button
                                                onClick={() => setSnsTab('video')}
                                                className={`px-4 py-2.5 font-bold text-xs md:text-sm border-b-2 whitespace-nowrap transition ${
                                                    snsTab === 'video' ? 'border-rose-600 text-rose-600' : 'border-transparent text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                <i className="fa-solid fa-video mr-1.5"></i> ショート動画台本
                                            </button>
                                        </div>

                                        {/* SNS Tab 1: 𝕏 (Twitter) */}
                                        {snsTab === 'x' && (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs text-slate-500">
                                                    <span><i className="fa-solid fa-circle-info text-teal-600 mr-1"></i> アルゴリズム特長: 1行目の強烈フック + 箇条書きで可読性を極大化</span>
                                                    <button
                                                        onClick={() => copyToClipboard(marketingData.x_post, '𝕏投稿をコピーしました')}
                                                        className="px-3 py-1 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition"
                                                    >
                                                        <i className="fa-regular fa-copy mr-1"></i> コピー
                                                    </button>
                                                </div>
                                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm leading-relaxed whitespace-pre-line font-sans text-slate-800">
                                                    {marketingData.x_post || '𝕏用の投稿文はありません。'}
                                                </div>
                                            </div>
                                        )}

                                        {/* SNS Tab 2: Threads */}
                                        {snsTab === 'threads' && (
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-center text-xs text-slate-500">
                                                    <span><i className="fa-solid fa-circle-info text-teal-600 mr-1"></i> アルゴリズム特長: 会話を生む連続スレッド形式 (1/3, 2/3, 3/3)</span>
                                                    <button
                                                        onClick={() => copyToClipboard(
                                                            Array.isArray(marketingData.threads) ? marketingData.threads.join('\n\n---\n\n') : marketingData.threads,
                                                            'Threads投稿を全コピーしました'
                                                        )}
                                                        className="px-3 py-1 bg-slate-900 text-white rounded-lg hover:bg-slate-800 transition"
                                                    >
                                                        <i className="fa-regular fa-copy mr-1"></i> 全スレッドコピー
                                                    </button>
                                                </div>

                                                {Array.isArray(marketingData.threads) ? (
                                                    marketingData.threads.map((post, idx) => (
                                                        <div key={idx} className="p-4 bg-slate-50 border border-slate-200 rounded-xl relative space-y-2">
                                                            <div className="flex justify-between items-center border-b border-slate-200 pb-2">
                                                                <span className="text-xs font-bold text-slate-500">投稿 {idx + 1} / {marketingData.threads.length}</span>
                                                                <button
                                                                    onClick={() => copyToClipboard(post, `スレッド ${idx + 1} をコピーしました`)}
                                                                    className="text-xs text-teal-600 hover:underline font-medium"
                                                                >
                                                                    コピー
                                                                </button>
                                                            </div>
                                                            <p className="text-sm leading-relaxed whitespace-pre-line text-slate-800">{post}</p>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm whitespace-pre-line text-slate-800">
                                                        {marketingData.threads || 'Threads用の投稿文はありません。'}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* SNS Tab 3: Instagram */}
                                        {snsTab === 'instagram' && (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs text-slate-500">
                                                    <span><i className="fa-solid fa-circle-info text-pink-600 mr-1"></i> アルゴリズム特長: 冒頭2行の惹きつけ + 「保存（Save）」行動のトリガー挿入</span>
                                                    <button
                                                        onClick={() => copyToClipboard(marketingData.instagram_post, 'Instagram投稿をコピーしました')}
                                                        className="px-3 py-1 bg-pink-600 text-white rounded-lg hover:bg-pink-700 transition"
                                                    >
                                                        <i className="fa-regular fa-copy mr-1"></i> コピー
                                                    </button>
                                                </div>
                                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm leading-relaxed whitespace-pre-line text-slate-800">
                                                    {marketingData.instagram_post || 'Instagram用の投稿文はありません。'}
                                                </div>
                                            </div>
                                        )}

                                        {/* SNS Tab 4: Facebook */}
                                        {snsTab === 'facebook' && (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs text-slate-500">
                                                    <span><i className="fa-solid fa-circle-info text-blue-600 mr-1"></i> アルゴリズム特長: ベタ書き厳禁！適切な【改行＋空行】による高いストーリー可読性</span>
                                                    <button
                                                        onClick={() => copyToClipboard(marketingData.facebook_post, 'Facebook投稿をコピーしました')}
                                                        className="px-3 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                                                    >
                                                        <i className="fa-regular fa-copy mr-1"></i> コピー
                                                    </button>
                                                </div>
                                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm leading-relaxed whitespace-pre-line text-slate-800">
                                                    {marketingData.facebook_post || 'Facebook用の投稿文はありません。'}
                                                </div>
                                            </div>
                                        )}

                                        {/* SNS Tab 5: Video Script */}
                                        {snsTab === 'video' && (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center text-xs text-slate-500">
                                                    <span><i className="fa-solid fa-circle-info text-rose-600 mr-1"></i> アルゴリズム特長: 冒頭1〜3秒の結論離脱防止フック + テンポの良い15~30秒台本</span>
                                                    <button
                                                        onClick={() => copyToClipboard(
                                                            Array.isArray(marketingData.video_captions) ? marketingData.video_captions.join('\n\n') : marketingData.video_captions,
                                                            '動画台本をコピーしました'
                                                        )}
                                                        className="px-3 py-1 bg-rose-600 text-white rounded-lg hover:bg-rose-700 transition"
                                                    >
                                                        <i className="fa-regular fa-copy mr-1"></i> 台本一括コピー
                                                    </button>
                                                </div>

                                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-3">
                                                    {Array.isArray(marketingData.video_captions) ? (
                                                        marketingData.video_captions.map((sec, idx) => (
                                                            <div key={idx} className="p-3 bg-white rounded-lg border border-slate-200 text-sm">
                                                                <span className="text-xs font-bold text-rose-600 block mb-1">パート {idx + 1}</span>
                                                                <p className="text-slate-800 font-medium">{sec}</p>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <p className="text-sm whitespace-pre-line text-slate-800">{marketingData.video_captions}</p>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* STEP 4: BATCH EXPORT & PREVIEW */}
                        {}
                        {activeTab === 'step4' && (
                            <div className="space-y-6">
                                <div className="border-b border-slate-100 pb-4">
                                    <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                                        <i className="fa-solid fa-box-archive text-teal-600"></i>
                                        生成コンテンツの一括確認・保存
                                    </h2>
                                    <p className="text-slate-500 text-sm mt-1">
                                        作成したコンセプト、note本文、各SNS用集客テキストをまとめてコピーできます。
                                    </p>
                                </div>

                                <div className="space-y-4">
                                    {/* Copy All Button */}
                                    <button
                                        onClick={() => {
                                            const fullBundle = `【売れるnoteコンセプト】\nタイトル: ${noteConcept?.title || '未設定'}\n価格帯: ${noteConcept?.priceSuggestion || ''}\n\n【note本文】\n${generatedContent || '（未生成）'}\n\n【𝕏投稿】\n${marketingData?.x_post || '（未生成）'}\n\n【Threads投稿】\n${Array.isArray(marketingData?.threads) ? marketingData.threads.join('\n\n') : (marketingData?.threads || '（未生成）')}\n\n【Instagram投稿】\n${marketingData?.instagram_post || '（未生成）'}\n\n【Facebook投稿】\n${marketingData?.facebook_post || '（未生成）'}`;
                                            copyToClipboard(fullBundle, 'すべての生成成果物を一括コピーしました！');
                                        }}
                                        className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-sm"
                                    >
                                        <i className="fa-solid fa-copy"></i> コンセプト・記事本文・全SNS投稿文を一括コピー
                                    </button>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4">
                                        <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-2">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-slate-600">Step 1: コンセプトデータ</span>
                                                <button
                                                    onClick={() => copyToClipboard(JSON.stringify(noteConcept, null, 2), 'コンセプトデータをコピーしました')}
                                                    className="text-xs text-teal-600 hover:underline"
                                                >
                                                    コピー
                                                </button>
                                            </div>
                                            <p className="text-xs text-slate-500 truncate">
                                                {noteConcept ? noteConcept.title : '未生成'}
                                            </p>
                                        </div>

                                        <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-2">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xs font-bold text-slate-600">Step 2: note記事本文</span>
                                                <button
                                                    onClick={() => copyToClipboard(generatedContent, '本文をコピーしました')}
                                                    className="text-xs text-teal-600 hover:underline"
                                                >
                                                    コピー
                                                </button>
                                            </div>
                                            <p className="text-xs text-slate-500">
                                                {generatedContent ? `約 ${generatedContent.length} 文字` : '未生成'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
