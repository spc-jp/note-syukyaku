    // --- Gemini API 呼び出し共通関数 (Cloudflare Workers経由) ---
    const callGeminiAPI = async (prompt, systemInstruction = "", isJson = false, schema = null) => {
      const url = `${WORKER_URL}/generate-text`;

      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] },
        generationConfig: {}
      };

      if (isJson) {
        payload.generationConfig.responseMimeType = "application/json";
        if (schema) {
          payload.generationConfig.responseSchema = schema;
        }
      }

      const maxRetries = 5;
      const baseDelay = 1000;

      for (let attempt = 0; attempt < maxRetries; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `API error: ${response.status}`);
          }

          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!text) throw new Error("No text in response");

          return isJson ? JSON.parse(text) : text;
        } catch (error) {
          if (attempt === maxRetries - 1) {
            throw new Error(`APIの呼び出しに失敗しました。詳細: ${error.message}`);
          }
          await new Promise(resolve => setTimeout(resolve, baseDelay * Math.pow(2, attempt)));
        }
      }
    };

    // --- 画像生成API呼び出し関数 (Imagen 4 - Cloudflare Workers経由) ---
    const generateImageAPI = async (prompt) => {
      const url = `${WORKER_URL}/generate-image`;
      
      const payload = {
        instances: { prompt: prompt },
        parameters: { sampleCount: 1 }
      };

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `画像生成APIエラー: ${response.status}`);
      }

      const data = await response.json();
      if (data.predictions && data.predictions[0] && data.predictions[0].bytesBase64Encoded) {
        return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
      } else {
        throw new Error("画像の生成に失敗しました。");
      }
    };

    // サムネイルスタイル

      { id: 2, name: "ジブリ風・ノスタルジックアニメ", desc: "息をのむような美しい水彩画、どこか温かくノスタルジックなアニメアート", prompt: "Breathtaking Studio Ghibli anime aesthetic, cinematic hand-drawn watercolor illustration, nostalgic golden hour sunlight filtering through clouds, rich grass and wood textures, warm nostalgic atmosphere, masterpiece animation background" },
      { id: 3, name: "TikTok風・ネオンポップ", desc: "Z世代を釘付けにする、鮮やかでダイナミックな未来型デュオトーンポップ", prompt: "Vibrant Gen-Z neon pop aesthetic, ultra-modern bold 3D elements, energetic magenta and electric cyan duotone glow, abstract liquid fluid shapes, high contrast, highly engaging social media trendy design, polished and dynamic" },
      { id: 4, name: "モダン・ベクターイラスト", desc: "シンプルかつ洗練されたライン。海外の有名Web誌のようなエディトリアルデザイン", prompt: "High-end editorial vector illustration, sophisticated flat design, clean thin outline path, minimalist geometry, smart and intelligent color palette (deep navy, muted orange, cream white), professional publication aesthetic, extremely clean layout" },
      { id: 5, name: "少年漫画・熱血突破", desc: "荒々しくも美しい筆致で描かれた、魂を燃え上がらせるエネルギッシュな漫画風", prompt: "Epic dynamic Japanese shonen manga style, powerful ink-painted action lines, roaring energy aura, dramatic cinematic framing, high-contrast heroic color scheme (burning orange and deep black), intense and passionate anime concept art" },
      { id: 6, name: "サイバーパンク・フューチャー", desc: "ダークトーンの背景に走るレーザー光。近未来を彷彿とさせる圧倒的テック感", prompt: "Stunning cyberpunk digital cityscape, ultra-detailed futuristic tech UI overlay, dark glossy background with glowing neon violet and laser green lights, high-tech holographic interface, octane render, cinematic synthwave vibe" },
      { id: 7, name: "和風モダン・重厚スタイル", desc: "水墨画の濃淡に金箔の輝きが交わる、日本の伝統と高級感を極めた和モダン", prompt: "Exquisite modern Japanese sumi-e wash, traditional wet ink-brush strokes, gold leaf accents glowing under soft dramatic spotlight, rich paper texture, elegant minimalist composition, wabi-sabi luxury aesthetic, high-contrast black, white, and deep gold" },
      { id: 8, name: "YouTubeサムネイル・超目立つポップ", desc: "文字を乗せた際に最もクリックを誘発する、視認性とインパクトを極めた王道ポップ", prompt: "Ultra-high-impact professional YouTube thumbnail style, dramatic high-contrast studio scene, bold glowing outline around a high-fidelity 3D rendered key focal object on the right side, premium dark-to-bright colored textured background, perfect left-side empty space meticulously designed for large title overlay" },
      { id: 9, name: "実写・ビジネスインフルエンサー風", desc: "1億画素のプロ機材で撮られたような、ラグジュアリーな空気感を纏う実写クオリティ", prompt: "Premium editorial business portrait photography, shot on Hasselblad 100MP, luxurious modern office workspace background with stunning golden sunlight and soft cinematic f/1.4 lens bokeh, ultra-realistic skin and fabric textures, sophisticated and trustworthy professional atmosphere, minimalist composition with professional empty space" }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState(1);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      // Step 1
      const [genre, setGenre] = useState("");
      const [themes, setThemes] = useState([]);
      const [selectedTheme, setSelectedTheme] = useState("");
      
      // 有料/無料設定
      const [isPaid, setIsPaid] = useState(true);
      const [price, setPrice] = useState("980");
      const [benefit, setBenefit] = useState("");
      
      // 特典設定
      const [hasBonus, setHasBonus] = useState(false);
      const [bonusContent, setBonusContent] = useState("");
      const [hasLineBonus, setHasLineBonus] = useState(false);
      const [lineBonusContent, setLineBonusContent] = useState("");
      const [lineUrl, setLineUrl] = useState("");

      const [hasLimitedSale, setHasLimitedSale] = useState(false);
      
      // 無料時の追加フィールド
      const [redirectUrl, setRedirectUrl] = useState("");
      const [redirectPurpose, setRedirectPurpose] = useState("");
      
      const [toc, setToc] = useState("");

      // Step 2
      const [articleBody, setArticleBody] = useState("");

      // Step 3
      const [marketingData, setMarketingData] = useState(null);

      // Step 4
      const [selectedStyleId, setSelectedStyleId] = useState(1);
      const [generatedImagePrompt, setGeneratedImagePrompt] = useState("");
      const [generatedImageUrl, setGeneratedImageUrl] = useState("");
      const [isGeneratingImage, setIsGeneratingImage] = useState(false);

      const [copiedStates, setCopiedStates] = useState({});

      const handleCopy = (text, id) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopiedStates(prev => ({ ...prev, [id]: true }));
          setTimeout(() => setCopiedStates(prev => ({ ...prev, [id]: false })), 2000);
        } catch (err) {
          console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
      };

      // 【初期画面（完全にクリーンな初期状態）に戻すリセット関数】
      const handleReset = () => {
        setActiveTab(1);
        setGenre("");
        setThemes([]);
        setSelectedTheme("");
        setIsPaid(true);
        setPrice("980");
        setBenefit("");
        setHasBonus(false);
        setBonusContent("");
        setHasLineBonus(false);
        setLineBonusContent("");
        setLineUrl("");
        setHasLimitedSale(false);
        setRedirectUrl("");
        setRedirectPurpose("");
        setToc("");
        setArticleBody("");
        setMarketingData(null);
        setSelectedStyleId(1);
        setGeneratedImagePrompt("");
        setGeneratedImageUrl("");
        setError("");
      };

      // 1. テーマ案の生成
      const generateThemes = async () => {
        if (!genre) { setError("ジャンルを入力してください（例：ダイエット、副業、人間関係など）"); return; }
        setLoading(true); setError("");
        try {
          const systemPrompt = `あなたは優秀なコンテンツマーケターです。
          HARMの法則（Health, Ambition, Relation, Money）を意識し、悩み解決につながるnoteの「HowTo系テーマ案（〜の方法、〜の手順など）」を提案してください。
          出力はJSON形式で、5つのテーマ案の文字列（タイトルのみ）の配列を返してください。`;
          const prompt = `ジャンル「${genre}」で、ターゲット層が思わず買いたくなる有料または優良フリーのnoteのテーマ案（タイトル）を5つ作成してください。`;
          
          const schema = { type: "ARRAY", items: { type: "STRING" } };
          const result = await callGeminiAPI(prompt, systemPrompt, true, schema);
          
          let parsedThemes = [];
          if (Array.isArray(result)) {
            parsedThemes = result.map(t => typeof t === 'string' ? t : (t.title || t.name || JSON.stringify(t)));
          } else if (result && result.themes && Array.isArray(result.themes)) {
            parsedThemes = result.themes.map(t => typeof t === 'string' ? t : (t.title || JSON.stringify(t)));
          }
          setThemes(parsedThemes);
          setBenefit("");
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      // 2. 目次案の生成
      const generateToc = async () => {
        if (!selectedTheme) { setError("テーマを選択してください"); return; }
        setLoading(true); setError("");
        try {
          const monetizationStrategy = isPaid 
            ? `【有料販売（無料・有料の分割設計）】: この商品は「予定価格：${price}円」で販売予定です。
               前半の「無料公開エリア」で読者に強い共感を伝え、最高の解決策の手前（はさみマークのペイウォールライン）で有料へと移行する寸止め構成にしてください。`
            : `【無料公開＋外部誘導】: この記事は無料で一般公開されますが、最終的に読者を外部サイトへ自然に誘導する目的があります。${redirectUrl ? `誘導先URL: ${redirectUrl}` : ''} ${redirectPurpose ? `誘導目的: ${redirectPurpose}` : ''}`;

          const systemPrompt = `あなたは特定のジャンルの専門家です。読者の悩みを解決するnoteの目次を作成します。
          大見出し（章タイトル等の大枠）のみを使って、シンプルで多すぎない論理的な構成にしてください。導入から具体的な解決策、まとめまでの流れを作ってください。
          ${monetizationStrategy}
          ${benefit ? `【提供価値（得られる未来）】: ${benefit}` : ''}
          ${hasBonus ? `【購入特典】: ${bonusContent || '限定特典・限定付録ワークシート等'}` : ''}
          ${hasLineBonus ? `【公式LINE登録特典】: ${lineBonusContent} (LINE追加URL: ${lineUrl || '公式LINEリンク'})\n※記事の最後の結びの部分で、公式LINEへの登録とLINE登録特典の受け取りを促す案内セクションを目次に含めてください。` : ''}`;
          
          const prompt = `テーマ：「${selectedTheme}」\nこのテーマでnoteを書きます。目次を作成してください。`;
          const result = await callGeminiAPI(prompt, systemPrompt, false);
          setToc(result);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      // 3. 本文の生成 (無料/有料寸止め境界線挿入を完全自動化)
      const generateArticle = async () => {
        if (!toc) { setError("目次を入力してください"); return; }
        setLoading(true); setError("");
        try {
          // 有料時のプロンプト：「無料エリア」＋「寸止めコピー」＋「有料エリア」の境界線を強制的に作らせる
          const monetizationContext = isPaid 
            ? `この記事は「価格：${price}円」の価値がある有料noteとして販売されます。
               読者が最初の無料部分を読んだ時点で「この先を読まなければ損をする！」と強く感じ、購入後に「価格以上の価値がある！」と大満足するような二段階構成で執筆してください。

               【有料販売のための分割執筆ルール】
               1. 本文全体のボリュームの約 35〜45% を「無料部分（導入、ターゲットへの強い共感、悩みの根本原因の指摘）」として執筆してください。
               2. 無料部分の最後に、読者の購買意欲を最大限に刺激する【魅力的な寸止めセールスコピー】（この課題を克服する具体的な実践手順や、特別なノウハウがこの先で手に入るという期待感の提示）を2段落ほどで熱を込めて書いてください。
               3. 寸止めコピーの直後に、noteの管理画面で有料ラインを設定するためのコピペ用ガイドラインとして、必ず以下の区切り線を1行独立させて挿入してください。
                  
                  ✂️ーーー【有料設定ライン（ここから先を有料エリアにしてください）】ーーー
                  
               4. 区切り線の後から、核心部分となる具体的な解決ノウハウ、今日からできる実践ステップ、極秘のテクニックを詳細に解説した「有料エリア」を執筆してください。
               5. 有料部分の最後には、購入者への感謝のメッセージと、読者限定プレゼント特典の情報（特典: ${bonusContent || "なし"}）を必ず添えてください。`
            : `この記事は「完全無料」のコンテンツとして公開されます。まずは読者に圧倒的な価値をプレゼントしてファンになってもらうことが目的です。
               And, 本文の最後の章（まとめ、または結び）のなかで、外部誘導先（目的: ${redirectPurpose || "詳細サイト確認"}, URL: ${redirectUrl || "サイトリンク"}）への案内文（クリックを促す魅力的な導線文章）を、自然かつ強力なCall To Actionとして必ず設置してください。`;

          const systemPrompt = `あなたはプロのライターです。提供された目次を元に、noteの本文を執筆します。
          【重要ルール】
          - noteの目次が多すぎて複雑になるのを防ぐため、見出しは「大見出し（## 章タイトル）」のみを使用してください。中見出し（###）や小見出し（####）は絶対に作らないでください。
          - 詳細なポイントや重要な解説は、見出しを作成せずに、文章のなかで「**太字**」にして強調し分かりやすく説明してください。
          - AIっぽい堅苦しい表現は避け、人間らしい自然な言葉遣いにすること。
          - 読者がイメージしやすいように、具体的な例え話や、よくある失敗談などの「疑似体験談」を交えること。
          - 読みやすさを重視し、適度に改行や空白行を入れること。
          - 箇条書きや引用ブロックなどを効果的に使うこと。
          
          【特典導線ルール】
          ${hasLineBonus ? `【重要：公式LINE追加特典CTAの自動設置】: 本文の最後の「大見出しの終わり、かつハッシュタグの直前」に、LINE公式アカウントの追加と特典プレゼントを強く呼びかける案内文を自然に挿入してください。
            特典内容: ${lineBonusContent}
            LINE追加用URL: ${lineUrl || 'https://line.me/R/ti/p/... (あなたのLINE公式リンク)'}
            案内は魅力的で、今すぐクリックして受け取りたくなるようなコピーにしてください。` : ''}
          
          - 本文の「一番最後（すべての文字の最後）」には、この記事のテーマに関連する効果的なハッシュタグを、横並び（半角スペース区切り）で「ちょうど7つ」出力してください。（例：#タグ1 #タグ2 #タグ3 #タグ4 #タグ5 #タグ6 #タグ7）
          
          【販売戦略コンテキスト】
          ${monetizationContext}
          ${benefit ? `【期待される提供価値（購入/完読後に得られる成果）】: ${benefit}` : ''}`;
          
          const prompt = `以下のテーマと目次に従って、有料または無料noteの本文を最後まで書き上げてください。\n\nテーマ：${selectedTheme}\n\n目次：\n${toc}`;
          const result = await callGeminiAPI(prompt, systemPrompt, false);
          setArticleBody(result);
          setActiveTab(3);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);

          1. クリックしたくなる魅力的なnoteのタイトル案（3つ）

          出力は以下のJSONスキーマに従ってください。`;

            type: "OBJECT",
            properties: {

              x_post: { type: "STRING" },
              threads: { type: "ARRAY", items: { type: "STRING" } },
              facebook_post: { type: "STRING" }

                    <div className="space-y-3">
                      <div className="flex items-center justify-between">
                        <h3 className="text-sm font-bold text-slate-700">目次案 (自由に編集してブラッシュアップしましょう)</h3>
                        <button onClick={() => handleCopy(toc, 'toc')} className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-xs">
                          {copiedStates['toc'] ? <Check className="text-green-500" /> : <Copy />}
                          コピー
                        </button>
                      </div>
                      <textarea
                        value={toc}
                        onChange={(e) => setToc(e.target.value)}
                        rows={12}
                        className="w-full p-4 border border-slate-300 rounded-lg text-sm leading-relaxed focus:ring-2 focus:ring-indigo-500 outline-none font-mono"
                      />
                      <div className="flex justify-end pt-4">
                        <button
                          onClick={() => setActiveTab(2)}
                          className="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-md"
                        >
                          Step 2: 本文執筆へ進む
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* STEP 2 */}
              {activeTab === 2 && (
                <div className="space-y-6 animate-fade-in">
                  <div className="flex items-center justify-between border-b pb-2">
                    <h2 className="text-lg font-bold flex items-center gap-2">
                      <span className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>
                      目次から本文をAI執筆
                    </h2>
                  </div>
                  
                  {!toc ? (
                    <div className="text-center py-10 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                      <p className="text-slate-500 mb-4">まだ目次が作成されていません。</p>
                      <button onClick={() => setActiveTab(1)} className="text-indigo-600 font-medium hover:underline">
                        Step 1に戻って目次を作成する
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {/* 設定の要約を表示 */}
                      <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl text-xs space-y-1.5 text-slate-600">
                        <p className="font-bold text-slate-700 text-sm mb-1">現在の設定パラメータ</p>
                        <p><strong>選択中のテーマ:</strong> {selectedTheme}</p>
                        <p><strong>販売設定:</strong> {isPaid ? <span className="text-indigo-600 font-bold">💰 有料note ({price}円)</span> : <span className="text-emerald-600 font-bold">🎁 無料公開＋外部誘導 ({redirectPurpose || "サイト紹介"})</span>}</p>
                        {!isPaid && redirectUrl && <p><strong>誘導先URL:</strong> <span className="font-mono text-xs">{redirectUrl}</span></p>}
                        {benefit && <p><strong>期待される価値:</strong> {benefit}</p>}
                        {hasBonus && <p><strong>限定プレゼント特典:</strong> 🎁 {bonusContent || "あり"}</p>}
                        {hasLineBonus && <p><strong>LINE登録特典:</strong> 💬 {lineBonusContent || "あり"}</p>}
                        {isPaid && hasLimitedSale && <p><strong>販売戦略:</strong> 数量限定販売（値上げ戦略あり）</p>}
                      </div>

                      <div className="bg-blue-50 border border-blue-100 p-4 rounded-lg flex items-start gap-3">
                        <Lightbulb className="text-blue-600 flex-shrink-0 mt-0.5" />
                        <p className="text-sm text-blue-800">
                          {isPaid 
                            ? `無料エリア（約40%）で課題を浮き彫りにし、寸止めした位置に「✂️ 有料設定ライン」を自動挿入します。その後、有料エリア（約60%）で具体的解決策を執筆します。`
                            : `無料で最高級の信頼を獲得し、自然と「${redirectPurpose || 'リンクをクリック'}」したくなるように本文の導線文を自動構築します。`
                          }
                          {hasLineBonus && ` また、公式LINE（特典: ${lineBonusContent}）への最強登録導線を、本文の結びに組み込みます。`}
                        </p>
                      </div>
                      
                      <button
                        onClick={generateArticle}
                        disabled={loading}
                        className="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-500 transition-colors flex items-center justify-center gap-2 disabled:opacity-50 shadow-md text-lg"
                      >
                        {loading ? <><Loader2 className="w-5 h-5 animate-spin" /> 本文を全力で執筆中...</> : <><PenTool className="w-5 h-5" /> AIで本文を一気に書き上げる</>}
                      </button>

                      {articleBody && (
                        <div className="space-y-3 mt-6">
                          <div className="flex items-center justify-between">
                            <h3 className="text-sm font-bold text-slate-700">生成された本文 (自由に修正してください)</h3>
                            <button onClick={() => handleCopy(articleBody, 'body')} className="text-slate-500 hover:text-indigo-600 flex items-center gap-1 text-sm bg-slate-100 px-3 py-1 rounded">
                              {copiedStates['body'] ? <><Check className="text-green-500" /> コピー完了</> : <><Copy /> 全てコピー</>}
                            </button>
                          </div>
                          <textarea
                            value={articleBody}
                            onChange={(e) => setArticleBody(e.target.value)}
                            rows={20}
                            className="w-full p-5 border border-slate-300 rounded-lg text-base leading-relaxed focus:ring-2 focus:ring-indigo-500 outline-none"
                          />
                          <div className="flex justify-end pt-4">
                             <button
                              onClick={() => setActiveTab(3)}
                              className="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-md"
                            >
                              Step 3: 集客準備へ進む
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* STEP 3 */}
              {activeTab === 3 && (
                <div className="space-y-6 animate-fade-in">
                  <div className="flex items-center justify-between border-b pb-2">
                    <h2 className="text-lg font-bold flex items-center gap-2">
                      <span className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">3</span>
                      売るためのタイトル＆SNS投稿文
                    </h2>
                  </div>

                  {!articleBody ? (
                    <div className="text-center py-10 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                      <p className="text-slate-500 mb-4">本文データがありません。</p>
                      <button onClick={() => setActiveTab(2)} className="text-indigo-600 font-medium hover:underline">
                        Step 2に戻って本文を作成する
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-6">
                       <button
                        onClick={generateMarketing}
                        disabled={loading}
                        className="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-500 transition-colors flex items-center justify-center gap-2 disabled:opacity-50 shadow-md text-lg"
                      >
                        {loading ? <><Loader2 className="w-5 h-5 animate-spin" /> 集客コンテンツを生成中...</> : <><Share2 className="w-5 h-5" /> タイトルとSNS集客文を生成する</>}
                      </button>

                      {marketingData && (
                        <div className="space-y-8 mt-6">
                          
                          {/* 一括コピーセクション */}
                          <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div>
                              <h4 className="font-bold text-indigo-900 text-sm">📣 すべてのSNS投稿を一発で一括コピー</h4>
                              <p className="text-xs text-indigo-700">𝕏（Twitter）、Threads（3段分）、Facebookの全ての投稿コピーを1つにまとめて一瞬でコピーします。</p>
                            </div>
                            <button
                              onClick={() => {
                                const allSnsText = `【𝕏 (Twitter) 投稿案】\n${marketingData.x_post}\n\n` +
                                  `【@ Threads 3段スレッド投稿案】\n` +
                                  `1段目:\n${marketingData.threads[0] || ""}\n\n` +
                                  `2段目:\n${marketingData.threads[1] || ""}\n\n` +
                                  `3段目:\n${marketingData.threads[2] || ""}\n\n` +
                                  `【f Facebook 投稿案】\n${marketingData.facebook_post}`;
                                handleCopy(allSnsText, 'copy-all-sns');
                              }}
                              className="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-5 rounded-lg text-sm flex items-center justify-center gap-2 shadow-sm transition-all duration-200"
                            >
                              {copiedStates['copy-all-sns'] ? (
                                <><Check className="w-4 h-4 text-green-300" /> コピー完了！</>
                              ) : (
                                <><Copy className="w-4 h-4" /> SNS投稿をすべて一括コピー</>
                              )}
                            </button>
                          </div>
                          
                          {/* Titles */}
                          <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-slate-50 border-b border-slate-200 px-4 py-3 flex justify-between items-center">
                              <h3 className="font-bold text-slate-800 flex items-center gap-2">
                                 <FileText className="text-slate-500" /> 売れるタイトル案
                              </h3>
                            </div>
                            <div className="p-4 space-y-3">
                              {marketingData.titles.map((title, idx) => (
                                <div key={idx} className="flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                   <p className="text-sm font-medium text-slate-800">{title}</p>
                                   <button onClick={() => handleCopy(title, `title-${idx}`)} className="p-2 text-slate-400 hover:text-indigo-600 rounded bg-white border shadow-sm">
                                      {copiedStates[`title-${idx}`] ? <Check className="text-green-500" /> : <Copy />}
                                   </button>
                                </div>
                              ))}
                            </div>
                          </div>

                          {/* X */}
                          <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-[#000000] px-4 py-3 flex justify-between items-center">
                              <h3 className="font-bold text-white flex items-center gap-2">𝕏 (Twitter) 投稿案</h3>
                              <button onClick={() => handleCopy(marketingData.x_post, 'x')} className="text-slate-300 hover:text-white flex items-center gap-1 text-xs">
                                 {copiedStates['x'] ? <Check className="text-green-400" /> : <Copy />} コピー
                              </button>
                            </div>
                            <div className="p-4">
                              <textarea readOnly value={marketingData.x_post} rows={5} className="w-full text-sm resize-none outline-none text-slate-700 bg-transparent" />
                            </div>
                          </div>

                          {/* Threads */}
                          <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-3 flex justify-between items-center">
                              <h3 className="font-bold text-white flex items-center gap-2">@ Threads 3段スレッド投稿案</h3>
                            </div>
                            <div className="p-4 space-y-4">
                               {marketingData.threads.map((thread, idx) => (
                                 <div key={idx} className="relative pl-6">
                                    {idx !== 2 && <div className="absolute left-[11px] top-8 bottom-[-24px] w-0.5 bg-slate-200"></div>}
                                    <div className="absolute left-0 top-1 w-6 h-6 bg-slate-100 rounded-full border-2 border-white flex items-center justify-center text-xs font-bold text-slate-400">
                                      {idx + 1}
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 relative group">
                                      <textarea readOnly value={thread} rows={4} className="w-full text-sm resize-none outline-none bg-transparent text-slate-700" />
                                      <button onClick={() => handleCopy(thread, `thread-${idx}`)} className="absolute top-2 right-2 p-1.5 text-slate-400 hover:text-indigo-600 rounded bg-white border shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">
                                          {copiedStates[`thread-${idx}`] ? <Check className="w-4 h-4 text-green-500" /> : <Copy />}
                                      </button>
                                    </div>
                                 </div>
                               ))}
                            </div>
                          </div>

                          {/* Facebook */}
                          <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-[#1877F2] px-4 py-3 flex justify-between items-center">
                              <h3 className="font-bold text-white flex items-center gap-2">f Facebook 投稿案</h3>
                              <button onClick={() => handleCopy(marketingData.facebook_post, 'fb')} className="text-slate-200 hover:text-white flex items-center gap-1 text-xs">
                                 {copiedStates['fb'] ? <Check className="text-green-400" /> : <Copy />} コピー
                              </button>
                            </div>
                            <div className="p-4">
                              <textarea readOnly value={marketingData.facebook_post} rows={8} className="w-full text-sm resize-none outline-none text-slate-700 bg-transparent" />
                            </div>
                          </div>

                          <div className="flex justify-end pt-4">
                             <button
                              onClick={() => setActiveTab(4)}
                              className="bg-slate-800 text-white px-8 py-3 rounded-lg font-bold hover:bg-slate-700 transition-colors shadow-md"
                            >
                              Step 4: サムネイル作成へ進む
                            </button>
                          </div>

                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* STEP 4 */}
              {activeTab === 4 && (
                <div className="space-y-6 animate-fade-in">
                  <div className="flex items-center justify-between border-b pb-2">
                    <h2 className="text-lg font-bold flex items-center gap-2">
                      <span className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded-full flex items-center justify-center text-sm">4</span>
                      売れるnoteの顔「サムネイル画像」をAI生成
                    </h2>
                  </div>

                  <div className="bg-gradient-to-r from-indigo-500/10 to-blue-500/10 border border-indigo-100 p-4 rounded-xl flex items-start gap-3 shadow-sm">
                    <Sparkles className="text-indigo-600 flex-shrink-0 mt-0.5" />
                    <div className="text-sm text-slate-700 space-y-1">
                      <p className="font-semibold text-indigo-900">✨ Gemini 2.5 Pro &amp; Imagen 4 プレミアム最適化モード稼働中</p>
                      <p>文字入れ前提の洗練された比率、商業アワード級の空気感、そしてテキストスペースを完璧に確保した高級感溢れるプロンプトを自動生成します。</p>
                      <p className="font-semibold text-indigo-900 mt-2">1. 記事やコンテンツの世界観に合うスタイル（全9タイプ）を選んでください。</p>
                    </div>
                  </div>

                  {/* スタイル選択 (全9タイプ) */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {THUMBNAIL_STYLES.map((style) => (
                      <div 
                        key={style.id}
                        onClick={() => setSelectedStyleId(style.id)}
                        className={`cursor-pointer p-4 rounded-xl border transition-all ${
                          selectedStyleId === style.id 
                            ? "bg-indigo-50 border-indigo-500 shadow-md ring-1 ring-indigo-500" 
                            : "bg-white border-slate-200 hover:border-indigo-300 hover:bg-slate-50"
                        }`}
                      >
                        <div className="flex items-center justify-between mb-2">
                          <h3 className="font-bold text-sm text-slate-800">{style.name}</h3>
                          {selectedStyleId === style.id && <Check className="text-indigo-600" />}
                        </div>
                        <p className="text-xs text-slate-500 leading-relaxed">{style.desc}</p>
                      </div>
                    ))}
                  </div>

                  <button
                    onClick={generateThumbnailImage}
                    disabled={isGeneratingImage || (!selectedTheme && !genre)}
                    className="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-4 rounded-xl font-bold hover:from-indigo-500 hover:to-indigo-600 transition-all flex items-center justify-center gap-2 disabled:opacity-50 shadow-md text-lg mt-6"
                  >
                    {isGeneratingImage ? (
                      <><Loader2 className="w-5 h-5 animate-spin" /> Gemini Engineがプロンプトとデザインを極限調整中...（約10〜20秒）</>
                    ) : (
                      <><Sparkles className="w-5 h-5 text-indigo-200" /> プレミアム仕様でサムネイル画像を自動生成する</>
                    )}
                  </button>

                  {/* 生成結果 */}
                  {(generatedImageUrl || generatedImagePrompt) && (
                    <div className="mt-8 space-y-6">
                      {generatedImageUrl && (
                        <div className="space-y-4 animate-fade-in">
                          <div className="flex items-center justify-between border-b pb-2">
                             <div className="flex items-center gap-2">
                               <span className="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-bold">生成成功</span>
                               <h3 className="text-sm font-bold text-slate-800">完成したサムネイル見出し画像 (16:9)</h3>
                             </div>
                             <a 
                               href={generatedImageUrl} 
                               download="note_thumbnail_image.png"
                               className="text-white bg-indigo-600 hover:bg-indigo-700 flex items-center gap-1.5 text-sm px-4 py-2 rounded-lg font-bold shadow-sm transition-colors"
                             >
                               <Download className="w-4 h-4" /> 画像を保存
                             </a>
                          </div>
                          <div className="bg-slate-100 border border-slate-200 rounded-2xl p-3 shadow-inner overflow-hidden flex justify-center">
                            <img src={generatedImageUrl} alt="Generated Thumbnail" className="w-full max-w-3xl h-auto rounded-xl shadow-md border border-white" />
                          </div>
                          <p className="text-xs text-slate-500 text-center leading-relaxed">
                            💡 <strong>デザイナーからのヒント：</strong>この画像にはすでに文字入れ用の美しい余白（グラデーションやボケ空間）が施されています。<br />
                            Canva等を使って、空いているスペースにお好みのフォントでnoteのタイトルを配置すれば、プロ顔負けのバナーが瞬時に完成します！
                          </p>
                        </div>
                      )}

                      {generatedImagePrompt && (
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 space-y-3">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <span className="bg-indigo-100 text-indigo-800 text-xs px-2.5 py-0.5 rounded-full font-bold">Prompt Generated</span>
                              <h4 className="text-xs font-bold text-slate-600 uppercase tracking-wider">AI専用高精細プログラマブルプロンプト（英語）</h4>
                            </div>
                            <button onClick={() => handleCopy(generatedImagePrompt, 'img-prompt')} className="text-slate-400 hover:text-slate-600 flex items-center gap-1 text-xs">
                              {copiedStates['img-prompt'] ? <Check className="text-green-500" /> : <Copy />}
                            </button>
                          </div>
                          <div className="bg-white border border-slate-150 p-4 rounded-lg">
                            <p className="text-xs font-mono text-slate-600 break-words leading-relaxed select-all">{generatedImagePrompt}</p>
                          </div>
                          <p className="text-[10px] text-slate-400 italic">
                            ※この高度なプロンプトは、構図・質感・空きスペース・ライティング・アングルすべてが最先端のImagen用に細かくチューニングされています。
                          </p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
